<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lilithian · Cadı Bildirgeci</title>

    <!-- ASTRONOMY CDN -->
    <script src="https://unpkg.com/astronomy-engine@2.1.19/astronomy.browser.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #0b0a0c;
            color: #f0e6d3;
            cursor: default;
        }

        /* ----- SVG İKON STİLLERİ ----- */
        .icon {
            display: inline-block;
            width: 1.2em;
            height: 1.2em;
            vertical-align: middle;
            fill: currentColor;
            stroke: none;
            flex-shrink: 0;
        }
        .icon-sm {
            width: 1em;
            height: 1em;
        }
        .icon-lg {
            width: 1.6em;
            height: 1.6em;
        }
        .icon-gold {
            fill: #d4c3a8;
        }
        .icon-moon {
            fill: #e8d5c0;
        }
        .icon-sun {
            fill: #f5c842;
        }
        .icon-planet {
            fill: #b8a48a;
        }
        .icon-lilith {
            fill: #a58b9e;
        }

        /* ----- VİDEO ----- */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: #0b0a0c;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .video-wrapper iframe {
            height: 100vh;
            width: calc(100vh * 9 / 16);
            min-width: 100vw;
            min-height: calc(100vw * 16 / 9);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: none;
            pointer-events: none;
        }

        /* ----- İÇERİK ----- */
        .content-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(11, 10, 12, 0.40);
            backdrop-filter: blur(3px);
            pointer-events: none;
        }
        .content-box {
            max-width: 860px;
            width: 100%;
            max-height: 92vh;
            background: rgba(11, 10, 12, 0.78);
            border: 1px solid rgba(240, 230, 211, 0.12);
            border-radius: 28px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            padding: 1.8rem 2.2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .content-box::-webkit-scrollbar {
            width: 4px;
        }
        .content-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .content-box::-webkit-scrollbar-thumb {
            background: rgba(240, 230, 211, 0.25);
            border-radius: 8px;
        }

        /* ----- SEKMELER ----- */
        .tabs {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(240, 230, 211, 0.08);
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #b8a48a;
            font-family: inherit;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0.5;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.04);
        }
        .tab-btn.active {
            opacity: 1;
            background: rgba(240, 230, 211, 0.08);
            color: #f5eee7;
            box-shadow: inset 0 0 0 1px rgba(240, 230, 211, 0.1);
        }

        /* ----- PANELLER ----- */
        .panel {
            display: none;
            animation: fadePanel 0.3s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadePanel {
            0% {
                opacity: 0.4;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel h2 {
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4c3a8;
            border-bottom: 1px solid rgba(240, 230, 211, 0.06);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .panel .sub {
            font-size: 0.85rem;
            color: #b8a48a;
            margin-bottom: 1rem;
        }

        /* ----- TABLO ----- */
        .sky-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .sky-table th {
            text-align: left;
            font-weight: 400;
            color: #b8a48a;
            letter-spacing: 1px;
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid rgba(240, 230, 211, 0.06);
        }
        .sky-table td {
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid rgba(240, 230, 211, 0.04);
            vertical-align: middle;
        }
        .sky-table tr:last-child td {
            border-bottom: none;
        }
        .sky-table .body-name {
            font-weight: 500;
            color: #e8d5c0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .sky-table .time {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #d4c3a8;
        }
        .sky-table .info {
            font-size: 0.75rem;
            color: #b8a48a;
        }

        /* ----- KARTLAR ----- */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            border: 1px solid rgba(240, 230, 211, 0.05);
        }
        .card h3 {
            font-weight: 400;
            color: #e8d5c0;
            font-size: 1rem;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card .sci {
            font-size: 0.8rem;
            color: #b8a48a;
            line-height: 1.5;
        }

        /* ----- RİTÜEL ----- */
        .ritual-steps {
            counter-reset: step;
            list-style: none;
            padding: 0;
        }
        .ritual-steps li {
            counter-increment: step;
            padding: 0.6rem 0 0.6rem 2.2rem;
            position: relative;
            border-bottom: 1px solid rgba(240, 230, 211, 0.04);
            line-height: 1.6;
        }
        .ritual-steps li::before {
            content: counter(step);
            position: absolute;
            left: 0;
            top: 0.6rem;
            font-size: 0.8rem;
            color: #b8a48a;
            background: rgba(255, 255, 255, 0.04);
            width: 1.6rem;
            height: 1.6rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(240, 230, 211, 0.1);
        }

        /* ----- MOBİL ----- */
        @media (max-width: 640px) {
            .content-box {
                padding: 1rem 1.2rem;
                max-height: 95vh;
                border-radius: 20px;
            }
            .tab-btn {
                font-size: 0.65rem;
                padding: 0.4rem 0.8rem;
            }
            .tab-btn .icon {
                width: 0.9em;
                height: 0.9em;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .sky-table {
                font-size: 0.7rem;
            }
            .sky-table .time {
                font-size: 0.65rem;
            }
            .panel h2 {
                font-size: 0.9rem;
            }
            .panel h2 .icon {
                width: 1em;
                height: 1em;
            }
        }

        .click-hint {
            position: fixed;
            bottom: 1.8rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: rgba(240, 230, 211, 0.2);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.7;
            }
        }
        .loading {
            text-align: center;
            padding: 1rem;
            color: #b8a48a;
            font-style: italic;
        }
        .error-msg {
            color: #e74c3c;
            text-align: center;
            padding: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- ===== VİDEO ===== -->
    <div class="video-wrapper">
        <iframe id="youtubeFrame"
        src="https://www.youtube.com/embed/JIgOlsfKtYw?autoplay=0&mute=0&loop=1&controls=0&playlist=JIgOlsfKtYw&disablekb=1&modestbranding=1&rel=0"

    <!-- ===== İÇERİK ===== -->
    <div class="content-overlay">
        <div class="content-box">

            <!-- SEKMELER -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tab1">
                    <svg class="icon"><use href="#icon-star"/></svg> Bildirge

                </h2>

                <div style="font-size:1.5rem; font-style:italic; margin:0.8rem 0;" id="messageDisplay">—</div>
                <div style="display:flex; flex-wrap:wrap; gap:0.5rem 1.2rem; font-size:0.95rem; color:#d4c3a8;" id="quickDetails"></div>

    <script>
        // ================================================================
        // 1. VİDEO BAŞLAT
        // ================================================================
        let videoStarted = false;
        const iframe = document.getElementById('youtubeFrame');

        function startVideo() {
            if (videoStarted) return;
            videoStarted = true;
            const src = iframe.src;
            if (src.includes('autoplay=0')) {
                iframe.src = src.replace('autoplay=0', 'autoplay=1');
            } else if (!src.includes('autoplay=1')) {
                iframe.src = src + '&autoplay=1';
            }
            const hint = document.querySelector('.click-hint');
            if (hint) { hint.style.transition = 'opacity 1.5s';
                hint.style.opacity = '0'; }
        }
        document.addEventListener('click', startVideo);
        document.addEventListener('touchstart', startVideo);

        // ================================================================
        // 2. SEKME GEÇİŞLERİ
        // ================================================================
        const tabBtns = document.querySelectorAll('.tab-btn');
        const panelIds = ['tab1', 'tab2', 'tab3', 'tab4'];
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                panelIds.forEach(id => {
                    document.getElementById(id).classList.toggle('active', id === target);
                });
            });
        });

        // ================================================================
        // 3. KONUM
        // ================================================================
        let userLat = 41.0082;
        let userLng = 28.9784;
        let locationReady = false;

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        locationReady = true;
                        console.log('📍 Konum alındı:', userLat, userLng);
                        renderAllPanels();
                    },
                    err => {
                        console.warn('⚠️ Konum alınamadı, varsayılan İstanbul kullanılıyor.', err.message);
                        locationReady = true;
                        renderAllPanels();
                    }, { timeout: 8000, enableHighAccuracy: true }
                );
            } else {
                locationReady = true;
                renderAllPanels();
            }
        }

        // ================================================================
        // 4. VERİ SETLERİ
        // ================================================================
        const MOON_PHASES = ['Yeni Ay', 'Hilal', 'İlk Dördün', 'Şişkin Ay (Büyüyen)',
            'Dolunay', 'Şişkin Ay (Azalan)', 'Son Dördün', 'Son Hilal'
        ];

        const HERBS = [
            { name: 'Lavanta (Lavandula angustifolia)', science: 'Linalool ve linalil asetat; anksiyolitik etki gösterir.' },
            { name: 'Adaçayı (Salvia officinalis)', science: 'Rosmarinik asit; antioksidan ve antienflamatuar.' },
            { name: 'Biberiye (Rosmarinus officinalis)', science: 'Karnosik asit; hafızayı destekleyici.' },
            { name: 'Papatya (Matricaria chamomilla)', science: 'Apigenin; hafif sedatif, uyku kalitesini artırır.' },
            { name: 'Melisa (Melissa officinalis)', science: 'Rosmarinik asit; antiviral ve sakinleştirici.' },
            { name: 'Kekik (Thymus vulgaris)', science: 'Timol ve karvakrol; güçlü antimikrobiyal.' }
        ];

        const CRYSTALS = [
            { name: 'Kuvars (SiO₂)', science: 'Piezoelektrik; enerji depolama ve iletimi.' },
            { name: 'Ametist (SiO₂+Fe)', science: 'Demir safsızlığı; trigonal kristal sistem.' },
            { name: 'Gül Kuvars (SiO₂+Ti/Fe)', science: 'Titanyum ve demir; pembe renkli trigonal.' },
            { name: 'Obsidiyen (volkanik cam)', science: 'Amorf silikat; Mohs 5-5.5.' },
            { name: 'Akik (SiO₂)', science: 'Mikrokristal kuvars; konsantrik bantlar.' }
        ];

        function getDailySeed() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            return Math.floor((now - start) / 86400000);
        }

        function getDailyItem(arr) {
            return arr[getDailySeed() % arr.length];
        }

        function getMoonPhase() {
            const now = new Date();
            const base = new Date(2000, 0, 1);
            const diff = Math.floor((now - base) / 86400000);
            return MOON_PHASES[Math.floor((diff % 29.53) / 29.53 * 8) % MOON_PHASES.length];
        }

        function getZodiac() {
            const now = new Date();
            const d = now.getDate(),
                m = now.getMonth() + 1;
            const signs = [
                { name: 'Oğlak', start: [1, 1], end: [1, 19] },
                { name: 'Kova', start: [1, 20], end: [2, 18] },
                { name: 'Balık', start: [2, 19], end: [3, 20] },
                { name: 'Koç', start: [3, 21], end: [4, 19] },
                { name: 'Boğa', start: [4, 20], end: [5, 20] },
                { name: 'İkizler', start: [5, 21], end: [6, 20] },
                { name: 'Yengeç', start: [6, 21], end: [7, 22] },
                { name: 'Aslan', start: [7, 23], end: [8, 22] },
                { name: 'Başak', start: [8, 23], end: [9, 22] },
                { name: 'Terazi', start: [9, 23], end: [10, 22] },
                { name: 'Akrep', start: [10, 23], end: [11, 21] },
                { name: 'Yay', start: [11, 22], end: [12, 21] },
                { name: 'Oğlak', start: [12, 22], end: [12, 31] }
            ];
            for (const s of signs) {
                const [sm, sd] = s.start,
                    [em, ed] = s.end;
                if ((m === sm && d >= sd) || (m === em && d <= ed)) return s.name;
            }
            return 'Oğlak';
        }

        // ================================================================
        // 5. ASTRONOMİK FONKSİYONLAR
        // ================================================================
        function formatTime(date) {
            if (!date || !(date instanceof Date) || isNaN(date.getTime())) return '—';
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
        }

        function getBodyRiseSet(body, observer, date) {
            try {
                const rise = Astronomy.SearchRiseSet(body, observer, Astronomy.Rise, date, 2.0, 0);
                const set = Astronomy.SearchRiseSet(body, observer, Astronomy.Set, date, 2.0, 0);
                return {
                    rise: rise ? rise.date : null,
                    set: set ? set.date : null
                };
            } catch (e) {
                console.warn(`Hata (${body}):`, e.message);
                return { rise: null, set: null };
            }
        }

        function getSignFromLongitude(deg) {
            const signs = ['Koç', 'Boğa', 'İkizler', 'Yengeç', 'Aslan', 'Başak',
                'Terazi', 'Akrep', 'Yay', 'Oğlak', 'Kova', 'Balık'
            ];
            const idx = Math.floor(((deg % 360) + 360) % 360 / 30);
            return signs[idx % 12];
        }

        function getPlanetEclipticLongitude(body, date) {
            try {
                const eq = Astronomy.Equator(body, date, false);
                const ecl = Astronomy.EquatorToEcliptic(eq);
                return ecl.lon;
            } catch (e) {
                return null;
            }
        }

        function getLilithLongitude(date) {
            try {
                const jd = Astronomy.JulianDay(date);
                const t = (jd - 2451545) / 36525;
                let lon = 83.3532430 + 0.1114040 * t * 36525;
                return ((lon % 360) + 360) % 360;
            } catch (e) {
                return null;
            }
        }

        // ================================================================
        // 6. RENDER ALL PANELS
        // ================================================================
        let renderDone = false;

        function renderAllPanels() {
            if (renderDone) return;
            if (!locationReady) {
                setTimeout(renderAllPanels, 300);
                return;
            }
            if (typeof Astronomy === 'undefined') {
                console.warn('⚠️ Astronomy yüklenmedi, 1 saniye sonra tekrar denenecek.');
                setTimeout(renderAllPanels, 1000);
                return;
            }

            console.log('🚀 Paneller render ediliyor...');

            const now = new Date();
            const moon = getMoonPhase();
            const zodiac = getZodiac();
            const herb = getDailyItem(HERBS);
            const crystal = getDailyItem(CRYSTALS);
            const dateStr = now.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric',
                weekday: 'long' });

            // ---- PANEL 1 ----
            document.getElementById('dateDisplay').textContent = dateStr;
            document.getElementById('messageDisplay').textContent = `✦ ${moon} · ${zodiac} ✦`;
            document.getElementById('quickDetails').innerHTML = `
                    <span>
                        <svg class="icon icon-sm"><use href="#icon-herb"/></svg>
                        ${herb.name.split('(')[0].trim()}
                    </span>
                    <span>
                        <svg class="icon icon-sm" style="fill:#b8a48a;"><use href="#icon-lilith"/></svg>
                        ${crystal.name.split('(')[0].trim()}
                    </span>
                `;
            document.getElementById('ritualSummary').innerHTML =
                `Bugün ${moon} ve ${zodiac} burcunun etkisiyle, ${herb.name.split('(')[0].trim()} ve ${crystal.name.split('(')[0].trim()} ile niyetini tazele.`;

            // ---- PANEL 3 ----
            document.getElementById('herbCrystalGrid').innerHTML = `
                    <div class="card">
                        <h3>
                            <svg class="icon"><use href="#icon-herb"/></svg>
                            ${herb.name}
                        </h3>
                        <div class="sci">${herb.science}</div>
                    </div>
                    <div class="card">
                        <h3>
                            <svg class="icon" style="fill:#b8a48a;"><use href="#icon-lilith"/></svg>
                            ${crystal.name}
                        </h3>
                        <div class="sci">${crystal.science}</div>
                    </div>
                    <div class="card" style="grid-column:1/-1;background:rgba(255,255,255,0.02);">
                        <h3>
                            <svg class="icon"><use href="#icon-bolt"/></svg>
                            Bilimsel Not
                        </h3>
                        <div class="sci">Bu bitki ve kristal, geleneksel cadılıkta kullanıldığı gibi, modern bilim de bu bileşenlerin çeşitli biyokimyasal ve fiziksel özelliklerini doğrulamaktadır.</div>
                    </div>
                `;

            // ---- PANEL 4 ----
            const ritualSteps = [
                `Hazırlık: ${herb.name.split('(')[0].trim()} ve ${crystal.name.split('(')[0].trim()}’u önüne koy.`,
                `Niyet: Bugünün ${moon} enerjisinde, ${zodiac} burcunun rehberliğinde net bir niyet belirle.`,
                `Odaklan: Kristali eline al, nefes al ve bitkinin kokusunu içine çek.`,
                `Fısılda: Niyetini üç kez sessizce tekrar et.`,
                `Kapat: Kristali ve bitkiyi gün boyu yanında taşı veya özel bir yere koy.`
            ];
            document.getElementById('ritualStepsContainer').innerHTML = `
                    <ol class="ritual-steps">${ritualSteps.map(s => `<li>${s}</li>`).join('')}</ol>
                    <div style="margin-top:1rem;font-size:0.8rem;color:#b8a48a;border-top:1px solid rgba(240,230,211,0.05);padding-top:0.8rem;display:flex;align-items:center;gap:0.5rem;">
                        <svg class="icon icon-sm"><use href="#icon-bolt"/></svg>
                        Bu ritüel, hem geleneksel cadı pratiğinden hem de modern farkındalık tekniklerinden esinlenmiştir.
                    </div>
                `;

            // ---- PANEL 2: GÖKYÜZÜ ----
            document.getElementById('locationDisplay').textContent =
                `📍 Enlem: ${userLat.toFixed(4)}°, Boylam: ${userLng.toFixed(4)}°`;

            try {
                const observer = new Astronomy.Observer(userLat, userLng, 0);
                const bodies = [
                    { id: Astronomy.Body.Sun, name: 'Güneş', icon: 'icon-sun', color: 'icon-sun' },
                    { id: Astronomy.Body.Moon, name: 'Ay', icon: 'icon-moon', color: 'icon-moon' },
                    { id: Astronomy.Body.Mercury, name: 'Merkür', icon: 'icon-mercury', color: 'icon-planet' },
                    { id: Astronomy.Body.Venus, name: 'Venüs', icon: 'icon-venus', color: 'icon-planet' },
                    { id: Astronomy.Body.Mars, name: 'Mars', icon: 'icon-mars', color: 'icon-planet' },
                    { id: Astronomy.Body.Jupiter, name: 'Jüpiter', icon: 'icon-jupiter', color: 'icon-planet' },
                    { id: Astronomy.Body.Saturn, name: 'Satürn', icon: 'icon-saturn', color: 'icon-planet' },
                    { id: Astronomy.Body.Uranus, name: 'Uranüs', icon: 'icon-uranus', color: 'icon-planet' },
                    { id: Astronomy.Body.Neptune, name: 'Neptün', icon: 'icon-neptune', color: 'icon-planet' }
                ];

                let tableRows = '';
                bodies.forEach(({ id, name, icon, color }) => {
                    const { rise, set } = getBodyRiseSet(id, observer, now);
                    const riseStr = rise ? formatTime(rise) : '—';
                    const setStr = set ? formatTime(set) : '—';
                    let signInfo = '';
                    if (id !== Astronomy.Body.Sun && id !== Astronomy.Body.Moon) {
                        const lon = getPlanetEclipticLongitude(id, now);
                        if (lon !== null) signInfo = ` · ${getSignFromLongitude(lon)}`;
                    } else if (id === Astronomy.Body.Sun) {
                        signInfo = ` · ${zodiac}`;
                    } else if (id === Astronomy.Body.Moon) {
                        const lon = getPlanetEclipticLongitude(id, now);
                        if (lon !== null) signInfo = ` · ${getSignFromLongitude(lon)}`;
                    }
                    tableRows += `<tr>
                            <td class="body-name">
                                <svg class="icon icon-sm ${color}"><use href="#${icon}"/></svg>
                                ${name}
                            </td>
                            <td class="time">${riseStr}</td>
                            <td class="time">${setStr}</td>
                            <td class="info">${signInfo}</td>
                        </tr>`;
                });

                // Lilith
                const lilithLon = getLilithLongitude(now);
                if (lilithLon !== null) {
                    const lilithSign = getSignFromLongitude(lilithLon);
                    tableRows += `<tr>
                            <td class="body-name">
                                <svg class="icon icon-sm icon-lilith"><use href="#icon-lilith"/></svg>
                                Lilith (Black Moon)
                            </td>
                            <td class="time">—</td>
                            <td class="time">—</td>
                            <td class="info">${lilithSign} (≈${lilithLon.toFixed(1)}°)</td>
                        </tr>`;
                } else {
                    tableRows += `<tr>
                            <td class="body-name">
                                <svg class="icon icon-sm icon-lilith"><use href="#icon-lilith"/></svg>
                                Lilith
                            </td>
                            <td colspan="3" class="info">—</td>
                        </tr>`;
                }

                document.getElementById('skyTableContainer').innerHTML = `
                        <table class="sky-table">
                            <thead><tr><th>Gök Cismi</th><th>Doğuş</th><th>Batış</th><th>Burç / Not</th></tr></thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                        <div style="margin-top:0.8rem;font-size:0.7rem;color:#6a5f53;text-align:right;">
                            * Yaklaşık değerler, ±2 dakika hata olabilir.
                        </div>
                    `;
            } catch (e) {
                document.getElementById('skyTableContainer').innerHTML =
                    `<div class="error-msg">⚠️ Gökyüzü verileri hesaplanırken hata oluştu: ${e.message}</div>`;
            }

            renderDone = true;
            console.log('✅ Tüm paneller başarıyla render edildi.');
        }

        // ================================================================
        // 7. BAŞLAT
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Lilithian başlatılıyor...');
            getLocation();

            let checkCount = 0;
            const checkInterval = setInterval(() => {
                checkCount++;
                if (typeof Astronomy !== 'undefined') {
                    clearInterval(checkInterval);
                    console.log('✅ Astronomy yüklendi.');
                    if (locationReady) renderAllPanels();
                } else if (checkCount > 30) {
                    clearInterval(checkInterval);
                    console.error('❌ Astronomy yüklenemedi.');
                    document.getElementById('skyTableContainer').innerHTML =
                        '<div class="error-msg">⚠️ Astronomi kütüphanesi yüklenemedi. Lütfen sayfayı yenileyin.</div>';
                }
            }, 300);
        });

        window.onerror = function(msg, url, line, col, error) {
            console.error('❌ Global hata:', msg, error);
            return true;
        };
    </script>
</body>
</html>
