<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lilithian · Cadı Bildirgeci</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />

    <script src="https://unpkg.com/astronomy-engine@2.1.19/astronomy.browser.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Cinzel', 'Georgia', serif;
            background-color: #0b0a0c;
            color: #f0e6d3;
            cursor: default;
            user-select: none;
        }

        .blood-drop {
            position: fixed;
            font-size: 2.2rem;
            pointer-events: none;
            z-index: 9999;
            opacity: 1;
        }

        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: #0b0a0c;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .video-wrapper iframe {
            height: 100vh;
            width: calc(100vh * 9 / 16);
            min-width: 100vw;
            min-height: calc(100vw * 16 / 9);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: none;
            pointer-events: none;
        }

        .content-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(11, 10, 12, 0.45);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .content-box {
            max-width: 880px;
            width: 100%;
            max-height: 92vh;
            background: rgba(11, 10, 12, 0.88);
            border: 1px solid rgba(212, 168, 75, 0.15);
            border-radius: 28px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(212, 168, 75, 0.03);
            pointer-events: auto;
            padding: 2rem 2.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .content-box::-webkit-scrollbar {
            width: 4px;
        }
        .content-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .content-box::-webkit-scrollbar-thumb {
            background: rgba(212, 168, 75, 0.3);
            border-radius: 8px;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(212, 168, 75, 0.12);
            padding-bottom: 0.7rem;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #b8a48a;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            opacity: 0.5;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid transparent;
        }
        .tab-btn:hover {
            opacity: 0.9;
            background: rgba(212, 168, 75, 0.06);
            border-color: rgba(212, 168, 75, 0.1);
        }
        .tab-btn.active {
            opacity: 1;
            background: rgba(212, 168, 75, 0.10);
            color: #f5eee7;
            border-color: rgba(212, 168, 75, 0.25);
            box-shadow: 0 0 20px rgba(212, 168, 75, 0.05);
        }
        .tab-btn .icon-symbol {
            width: 1.6rem;
            height: 1.6rem;
            fill: currentColor;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .tab-btn.active .icon-symbol {
            opacity: 1;
        }

        .panel {
            display: none;
            animation: fadePanel 0.4s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadePanel {
            0% {
                opacity: 0.3;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel h2 {
            font-family: 'Cinzel Decorative', 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #d4a84b;
            border-bottom: 2px solid rgba(212, 168, 75, 0.15);
            padding-bottom: 0.6rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            text-shadow: 0 0 30px rgba(212, 168, 75, 0.1);
        }
        .panel .sub {
            font-size: 0.9rem;
            color: #c4b49a;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        /* ----- TABLO ----- */
        .sky-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .sky-table th {
            text-align: left;
            font-weight: 600;
            color: #d4a84b;
            letter-spacing: 2px;
            padding: 0.5rem 0.3rem;
            border-bottom: 1px solid rgba(212, 168, 75, 0.12);
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .sky-table td {
            padding: 0.5rem 0.3rem;
            border-bottom: 1px solid rgba(212, 168, 75, 0.05);
            vertical-align: middle;
            line-height: 1.5;
        }
        .sky-table tr:last-child td {
            border-bottom: none;
        }
        .sky-table .body-name {
            font-weight: 600;
            color: #f0e6d3;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.95rem;
        }
        .sky-table .icon-symbol {
            width: 2rem;
            height: 2rem;
            flex-shrink: 0;
            fill: currentColor;
        }
        .sky-table .time {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #d4c3a8;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .sky-table .info {
            font-size: 0.8rem;
            color: #c4b49a;
        }

        /* RENKLER */
        .symbol-sun {
            fill: #f5c842;
        }
        .symbol-moon {
            fill: #e8d5c0;
        }
        .symbol-mercury {
            fill: #b8a48a;
        }
        .symbol-venus {
            fill: #e8a87c;
        }
        .symbol-mars {
            fill: #c0392b;
        }
        .symbol-jupiter {
            fill: #d4a84b;
        }
        .symbol-saturn {
            fill: #b8a48a;
        }
        .symbol-uranus {
            fill: #6ab0c9;
        }
        .symbol-neptune {
            fill: #4a7b9d;
        }
        .symbol-lilith {
            fill: #a58b9e;
        }

        /* ----- KARTLAR ----- */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            border: 1px solid rgba(212, 168, 75, 0.06);
            transition: border-color 0.3s;
        }
        .card:hover {
            border-color: rgba(212, 168, 75, 0.15);
        }
        .card h3 {
            font-weight: 600;
            color: #e8d5c0;
            font-size: 1rem;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .card .sci {
            font-size: 0.85rem;
            color: #c4b49a;
            line-height: 1.6;
        }
        .card .emoji-big {
            font-size: 2rem;
        }

        /* ----- RİTÜEL ----- */
        .ritual-steps {
            counter-reset: step;
            list-style: none;
            padding: 0;
        }
        .ritual-steps li {
            counter-increment: step;
            padding: 0.7rem 0 0.7rem 2.6rem;
            position: relative;
            border-bottom: 1px solid rgba(212, 168, 75, 0.05);
            line-height: 1.7;
            font-size: 0.95rem;
            color: #e0d3c0;
        }
        .ritual-steps li::before {
            content: counter(step);
            position: absolute;
            left: 0;
            top: 0.7rem;
            font-size: 0.8rem;
            color: #d4a84b;
            background: rgba(212, 168, 75, 0.08);
            width: 1.8rem;
            height: 1.8rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(212, 168, 75, 0.15);
            font-weight: 700;
        }

        /* ----- BİLDİRGE ----- */
        #messageDisplay {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.7rem;
            color: #f5eee7;
            text-shadow: 0 0 40px rgba(212, 168, 75, 0.08);
            letter-spacing: 2px;
            margin: 0.8rem 0;
        }
        #quickDetails span {
            background: rgba(212, 168, 75, 0.05);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(212, 168, 75, 0.06);
            font-size: 0.9rem;
        }
        #ritualSummary {
            font-size: 0.95rem;
            color: #d4c3a8;
            line-height: 1.6;
        }

        .click-hint {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: rgba(212, 168, 75, 0.15);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
            font-weight: 600;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.15;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loading {
            text-align: center;
            padding: 1.5rem;
            color: #b8a48a;
            font-style: italic;
            letter-spacing: 1px;
        }
        .error-msg {
            color: #c0392b;
            text-align: center;
            padding: 1.5rem;
            font-weight: 600;
            border: 1px solid rgba(192, 57, 43, 0.2);
            border-radius: 12px;
            background: rgba(192, 57, 43, 0.05);
        }
        .sky-loading {
            text-align: center;
            padding: 1rem;
            color: #b8a48a;
            font-size: 0.85rem;
            font-style: italic;
        }

        @media (max-width: 640px) {
            .content-box {
                padding: 1.2rem 1.2rem;
                max-height: 95vh;
                border-radius: 20px;
            }
            .tab-btn {
                font-size: 0.6rem;
                padding: 0.4rem 0.8rem;
                letter-spacing: 1px;
                gap: 0.3rem;
            }
            .tab-btn .icon-symbol {
                width: 1.2rem;
                height: 1.2rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .sky-table {
                font-size: 0.7rem;
            }
            .sky-table .time {
                font-size: 0.65rem;
            }
            .sky-table .icon-symbol {
                width: 1.6rem;
                height: 1.6rem;
            }
            .panel h2 {
                font-size: 0.95rem;
                letter-spacing: 2px;
            }
            #messageDisplay {
                font-size: 1.2rem;
            }
            .ritual-steps li {
                font-size: 0.85rem;
                padding-left: 2.2rem;
            }
            .ritual-steps li::before {
                width: 1.5rem;
                height: 1.5rem;
                font-size: 0.7rem;
                top: 0.6rem;
            }
            #quickDetails span {
                font-size: 0.8rem;
                padding: 0.2rem 0.8rem;
            }
            .card h3 {
                font-size: 0.9rem;
            }
            .card .sci {
                font-size: 0.8rem;
            }
            .card .emoji-big {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

    <script>
        // ================================================================
        // 0. KAN DAMLASI
        // ================================================================
        function createBloodDrop(event) {
            const x = event.clientX || (event.touches && event.touches[0].clientX) || window.innerWidth / 2;
            const y = event.clientY || (event.touches && event.touches[0].clientY) || 0;
            const drop = document.createElement('div');
            drop.className = 'blood-drop';
            drop.textContent = '🩸';
            const offsetX = (Math.random() - 0.5) * 160;
            const startX = window.innerWidth / 2 + offsetX;
            const startY = -30;
            const endX = x + offsetX * 0.5;
            const endY = Math.min(y + 150, window.innerHeight + 20);
            drop.style.left = startX + 'px';
            drop.style.top = startY + 'px';
            drop.style.transform = 'scale(0.6) rotate(0deg)';
            drop.style.opacity = '0.9';
            drop.style.fontSize = (1.8 + Math.random() * 0.8) + 'rem';
            document.body.appendChild(drop);
            let startTime = performance.now();
            const duration = 800 + Math.random() * 400;

            function animateDrop(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                const currentX = startX + (endX - startX) * ease;
                const currentY = startY + (endY - startY) * ease;
                const rotation = Math.sin(progress * Math.PI * 3) * 15;
                const scale = progress < 0.2 ? 0.6 + progress * 2 : (progress > 0.85 ? 1 - (progress - 0.85) * 6 : 1);
                const opacity = progress > 0.85 ? 1 - (progress - 0.85) * 6 : 1;
                drop.style.transform =
                    `translate(${currentX - startX}px, ${currentY - startY}px) scale(${scale}) rotate(${rotation}deg)`;
                drop.style.opacity = opacity;
                if (progress < 1) {
                    requestAnimationFrame(animateDrop);
                } else {
                    if (drop.parentNode) drop.parentNode.removeChild(drop);
                }
            }
            requestAnimationFrame(animateDrop);
        }
        document.addEventListener('click', createBloodDrop);
        document.addEventListener('contextmenu', function(e) { createBloodDrop(e);
            e.preventDefault(); return false; });
        document.addEventListener('touchstart', function(e) { if (e.touches.length > 0) createBloodDrop(e); }, { passive: true });

        // ================================================================
        // 1. VİDEO BAŞLAT
        // ================================================================
        let videoStarted = false;
        const iframe = document.getElementById('youtubeFrame');

        function startVideo() {
            if (videoStarted) return;
            videoStarted = true;
            const src = iframe.src;
            if (src.includes('autoplay=0')) {
                iframe.src = src.replace('autoplay=0', 'autoplay=1');
            } else if (!src.includes('autoplay=1')) {
                iframe.src = src + '&autoplay=1';
            }
            const hint = document.querySelector('.click-hint');
            if (hint) { hint.style.transition = 'opacity 1.5s';
                hint.style.opacity = '0'; }
        }
        document.addEventListener('click', startVideo);
        document.addEventListener('touchstart', startVideo);

        // ================================================================
        // 2. SEKME GEÇİŞLERİ
        // ================================================================
        const tabBtns = document.querySelectorAll('.tab-btn');
        const panelIds = ['tab1', 'tab2', 'tab3', 'tab4'];
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                panelIds.forEach(id => {
                    document.getElementById(id).classList.toggle('active', id === target);
                });
            });
        });

        // ================================================================
        // 3. VERİ SETLERİ
        // ================================================================
        const MOON_PHASES = ['Yeni Ay', 'Hilal', 'İlk Dördün', 'Şişkin Ay (Büyüyen)',
            'Dolunay', 'Şişkin Ay (Azalan)', 'Son Dördün', 'Son Hilal'
        ];

        const HERBS = [
            { name: 'Lavanta (Lavandula angustifolia)', science: 'Linalool ve linalil asetat; anksiyolitik etki gösterir.' },
            { name: 'Adaçayı (Salvia officinalis)', science: 'Rosmarinik asit; antioksidan ve antienflamatuar.' },
            { name: 'Biberiye (Rosmarinus officinalis)', science: 'Karnosik asit; hafızayı destekleyici.' },
            { name: 'Papatya (Matricaria chamomilla)', science: 'Apigenin; hafif sedatif, uyku kalitesini artırır.' },
            { name: 'Melisa (Melissa officinalis)', science: 'Rosmarinik asit; antiviral ve sakinleştirici.' },
            { name: 'Kekik (Thymus vulgaris)', science: 'Timol ve karvakrol; güçlü antimikrobiyal.' }
        ];

        const CRYSTALS = [
            { name: 'Kuvars (SiO₂)', science: 'Piezoelektrik; enerji depolama ve iletimi.' },
            { name: 'Ametist (SiO₂+Fe)', science: 'Demir safsızlığı; trigonal kristal sistem.' },
            { name: 'Gül Kuvars (SiO₂+Ti/Fe)', science: 'Titanyum ve demir; pembe renkli trigonal.' },
            { name: 'Obsidiyen (volkanik cam)', science: 'Amorf silikat; Mohs 5-5.5.' },
            { name: 'Akik (SiO₂)', science: 'Mikrokristal kuvars; konsantrik bantlar.' }
        ];

        function getDailySeed() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            return Math.floor((now - start) / 86400000);
        }

        function getDailyItem(arr) {
            return arr[getDailySeed() % arr.length];
        }

        function getMoonPhase() {
            const now = new Date();
            const base = new Date(2000, 0, 1);
            const diff = Math.floor((now - base) / 86400000);
            return MOON_PHASES[Math.floor((diff % 29.53) / 29.53 * 8) % MOON_PHASES.length];
        }

        function getZodiac() {
            const now = new Date();
            const d = now.getDate(),
                m = now.getMonth() + 1;
            const signs = [
                { name: 'Oğlak', start: [1, 1], end: [1, 19] },
                { name: 'Kova', start: [1, 20], end: [2, 18] },
                { name: 'Balık', start: [2, 19], end: [3, 20] },
                { name: 'Koç', start: [3, 21], end: [4, 19] },
                { name: 'Boğa', start: [4, 20], end: [5, 20] },
                { name: 'İkizler', start: [5, 21], end: [6, 20] },
                { name: 'Yengeç', start: [6, 21], end: [7, 22] },
                { name: 'Aslan', start: [7, 23], end: [8, 22] },
                { name: 'Başak', start: [8, 23], end: [9, 22] },
                { name: 'Terazi', start: [9, 23], end: [10, 22] },
                { name: 'Akrep', start: [10, 23], end: [11, 21] },
                { name: 'Yay', start: [11, 22], end: [12, 21] },
                { name: 'Oğlak', start: [12, 22], end: [12, 31] }
            ];
            for (const s of signs) {
                const [sm, sd] = s.start,
                    [em, ed] = s.end;
                if ((m === sm && d >= sd) || (m === em && d <= ed)) return s.name;
            }
            return 'Oğlak';
        }

        // ================================================================
        // 4. ASTRONOMİK FONKSİYONLAR
        // ================================================================
        function formatTime(date) {
            if (!date || !(date instanceof Date) || isNaN(date.getTime())) return '—';
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
        }

        function getBodyRiseSet(body, observer, date) {
            try {
                const rise = Astronomy.SearchRiseSet(body, observer, Astronomy.Rise, date, 2.0, 0);
                const set = Astronomy.SearchRiseSet(body, observer, Astronomy.Set, date, 2.0, 0);
                return {
                    rise: rise ? rise.date : null,
                    set: set ? set.date : null
                };
            } catch (e) {
                return { rise: null, set: null };
            }
        }

        function getSignFromLongitude(deg) {
            const signs = ['Koç', 'Boğa', 'İkizler', 'Yengeç', 'Aslan', 'Başak',
                'Terazi', 'Akrep', 'Yay', 'Oğlak', 'Kova', 'Balık'
            ];
            const idx = Math.floor(((deg % 360) + 360) % 360 / 30);
            return signs[idx % 12];
        }

        function getPlanetEclipticLongitude(body, date) {
            try {
                const eq = Astronomy.Equator(body, date, false);
                const ecl = Astronomy.EquatorToEcliptic(eq);
                return ecl.lon;
            } catch (e) {
                return null;
            }
        }

        function getLilithLongitude(date) {
            try {
                const jd = Astronomy.JulianDay(date);
                const t = (jd - 2451545) / 36525;
                let lon = 83.3532430 + 0.1114040 * t * 36525;
                return ((lon % 360) + 360) % 360;
            } catch (e) {
                return null;
            }
        }

        // ================================================================
        // 5. SEMBOL MAP
        // ================================================================
        const SYMBOL_IDS = {
            Sun: 'sym-sun',
            Moon: 'sym-moon',
            Mercury: 'sym-mercury',
            Venus: 'sym-venus',
            Mars: 'sym-mars',
            Jupiter: 'sym-jupiter',
            Saturn: 'sym-saturn',
            Uranus: 'sym-uranus',
            Neptune: 'sym-neptune',
            Lilith: 'sym-lilith'
        };

        const SYMBOL_CLASSES = {
            Sun: 'symbol-sun',
            Moon: 'symbol-moon',
            Mercury: 'symbol-mercury',
            Venus: 'symbol-venus',
            Mars: 'symbol-mars',
            Jupiter: 'symbol-jupiter',
            Saturn: 'symbol-saturn',
            Uranus: 'symbol-uranus',
            Neptune: 'symbol-neptune',
            Lilith: 'symbol-lilith'
        };

        // ================================================================
        // 6. STATİK İÇERİKLER (HEMEN)
        // ================================================================
        function renderStaticContent() {
            console.log('🚀 Statik içerikler render ediliyor...');

            const now = new Date();
            const moon = getMoonPhase();
            const zodiac = getZodiac();
            const herb = getDailyItem(HERBS);
            const crystal = getDailyItem(CRYSTALS);
            const dateStr = now.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric',
                weekday: 'long' });

            document.getElementById('dateDisplay').textContent = dateStr;
            document.getElementById('messageDisplay').textContent = `✦ ${moon} · ${zodiac} ✦`;
            document.getElementById('quickDetails').innerHTML = `
                    <span>🌿 ${herb.name.split('(')[0].trim()}</span>
                    <span>💎 ${crystal.name.split('(')[0].trim()}</span>
                `;
            document.getElementById('ritualSummary').innerHTML =
                `Bugün ${moon} ve ${zodiac} burcunun etkisiyle, ${herb.name.split('(')[0].trim()} ve ${crystal.name.split('(')[0].trim()} ile niyetini tazele.`;

            document.getElementById('herbCrystalGrid').innerHTML = `
                    <div class="card">
                        <h3><span class="emoji-big">🌿</span> ${herb.name}</h3>
                        <div class="sci">${herb.science}</div>
                    </div>
                    <div class="card">
                        <h3><span class="emoji-big">💎</span> ${crystal.name}</h3>
                        <div class="sci">${crystal.science}</div>
                    </div>
                    <div class="card" style="grid-column:1/-1;background:rgba(255,255,255,0.02);">
                        <h3><span style="font-size:1.4rem;">⚡</span> Bilimsel Not</h3>
                        <div class="sci">Bu bitki ve kristal, geleneksel cadılıkta kullanıldığı gibi, modern bilim de bu bileşenlerin çeşitli biyokimyasal ve fiziksel özelliklerini doğrulamaktadır.</div>
                    </div>
                `;

            const ritualSteps = [
                `Hazırlık: ${herb.name.split('(')[0].trim()} ve ${crystal.name.split('(')[0].trim()}’u önüne koy.`,
                `Niyet: Bugünün ${moon} enerjisinde, ${zodiac} burcunun rehberliğinde net bir niyet belirle.`,
                `Odaklan: Kristali eline al, nefes al ve bitkinin kokusunu içine çek.`,
                `Fısılda: Niyetini üç kez sessizce tekrar et.`,
                `Kapat: Kristali ve bitkiyi gün boyu yanında taşı veya özel bir yere koy.`
            ];
            document.getElementById('ritualStepsContainer').innerHTML = `
                    <ol class="ritual-steps">${ritualSteps.map(s => `<li>${s}</li>`).join('')}</ol>
                    <div style="margin-top:1.2rem;font-size:0.85rem;color:#c4b49a;border-top:1px solid rgba(212,168,75,0.08);padding-top:1rem;display:flex;align-items:center;gap:0.6rem;">
                        <span style="font-size:1.4rem;">⚡</span>
                        Bu ritüel, hem geleneksel cadı pratiğinden hem de modern farkındalık tekniklerinden esinlenmiştir.
                    </div>
                `;

            console.log('✅ Statik içerikler render edildi.');
        }

        // ================================================================
        // 7. GÖKYÜZÜ VERİLERİ (ASTRONOMY)
        // ================================================================
        let skyRenderDone = false;

        function renderSkyData() {
            if (skyRenderDone) return;
            if (typeof Astronomy === 'undefined') {
                document.getElementById('skyTableContainer').innerHTML =
                    '<div class="sky-loading">⏳ Astronomi verileri yükleniyor…</div>';
                setTimeout(renderSkyData, 2000);
                return;
            }
            if (typeof userLat === 'undefined' || typeof userLng === 'undefined') {
                document.getElementById('skyTableContainer').innerHTML =
                    '<div class="sky-loading">📍 Konum bekleniyor…</div>';
                setTimeout(renderSkyData, 1000);
                return;
            }

            console.log('🚀 Gökyüzü verileri hesaplanıyor...');

            try {
                const now = new Date();
                const zodiac = getZodiac();
                const observer = new Astronomy.Observer(userLat, userLng, 0);

                const bodies = [
                    { id: Astronomy.Body.Sun, name: 'Güneş', key: 'Sun' },
                    { id: Astronomy.Body.Moon, name: 'Ay', key: 'Moon' },
                    { id: Astronomy.Body.Mercury, name: 'Merkür', key: 'Mercury' },
                    { id: Astronomy.Body.Venus, name: 'Venüs', key: 'Venus' },
                    { id: Astronomy.Body.Mars, name: 'Mars', key: 'Mars' },
                    { id: Astronomy.Body.Jupiter, name: 'Jüpiter', key: 'Jupiter' },
                    { id: Astronomy.Body.Saturn, name: 'Satürn', key: 'Saturn' },
                    { id: Astronomy.Body.Uranus, name: 'Uranüs', key: 'Uranus' },
                    { id: Astronomy.Body.Neptune, name: 'Neptün', key: 'Neptune' }
                ];

                let tableRows = '';

                bodies.forEach(({ id, name, key }) => {
                    const { rise, set } = getBodyRiseSet(id, observer, now);
                    const riseStr = rise ? formatTime(rise) : '—';
                    const setStr = set ? formatTime(set) : '—';

                    let signInfo = '';
                    if (id !== Astronomy.Body.Sun && id !== Astronomy.Body.Moon) {
                        const lon = getPlanetEclipticLongitude(id, now);
                        if (lon !== null) signInfo = ` · ${getSignFromLongitude(lon)}`;
                    } else if (id === Astronomy.Body.Sun) {
                        signInfo = ` · ${zodiac}`;
                    } else if (id === Astronomy.Body.Moon) {
                        const lon = getPlanetEclipticLongitude(id, now);
                        if (lon !== null) signInfo = ` · ${getSignFromLongitude(lon)}`;
                    }

                    const symbolId = SYMBOL_IDS[key] || '';
                    const symbolClass = SYMBOL_CLASSES[key] || '';

                    tableRows += `<tr>
                            <td class="body-name">
                                <svg class="icon-symbol ${symbolClass}"><use href="#${symbolId}"/></svg>
                                ${name}
                            </td>
                            <td class="time">${riseStr}</td>
                            <td class="time">${setStr}</td>
                            <td class="info">${signInfo}</td>
                        </tr>`;
                });

                // Lilith
                const lilithLon = getLilithLongitude(now);
                if (lilithLon !== null) {
                    const lilithSign = getSignFromLongitude(lilithLon);
                    tableRows += `<tr>
                            <td class="body-name">
                                <svg class="icon-symbol symbol-lilith"><use href="#sym-lilith"/></svg>
                                Lilith (Black Moon)
                            </td>
                            <td class="time">—</td>
                            <td class="time">—</td>
                            <td class="info">${lilithSign} (≈${lilithLon.toFixed(1)}°)</td>
                        </tr>`;
                } else {
                    tableRows += `<tr>
                            <td class="body-name">
                                <svg class="icon-symbol symbol-lilith"><use href="#sym-lilith"/></svg>
                                Lilith
                            </td>
                            <td colspan="3" class="info">—</td>
                        </tr>`;
                }

                document.getElementById('locationDisplay').textContent =
                    `📍 Enlem: ${userLat.toFixed(4)}°, Boylam: ${userLng.toFixed(4)}°`;
                document.getElementById('skyTableContainer').innerHTML = `
                        <table class="sky-table">
                            <thead><tr><th>Gök Cismi</th><th>Doğuş</th><th>Batış</th><th>Burç / Not</th></tr></thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                        <div style="margin-top:0.8rem;font-size:0.7rem;color:#6a5f53;text-align:right;">
                            * Yaklaşık değerler, ±2 dakika hata olabilir.
                        </div>
                    `;

                skyRenderDone = true;
                console.log('✅ Gökyüzü verileri render edildi.');

            } catch (e) {
                console.error('❌ Gökyüzü hesaplama hatası:', e);
                document.getElementById('skyTableContainer').innerHTML =
                    `<div class="error-msg">⚠️ Gökyüzü verileri hesaplanırken hata oluştu: ${e.message}</div>`;
                setTimeout(renderSkyData, 5000);
            }
        }

        // ================================================================
        // 8. KONUM
        // ================================================================
        let userLat = 41.0082;
        let userLng = 28.9784;
        let locationReady = false;

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        locationReady = true;
                        console.log('📍 Konum alındı:', userLat, userLng);
                        renderSkyData();
                    },
                    err => {
                        console.warn('⚠️ Konum alınamadı, varsayılan İstanbul kullanılıyor.', err.message);
                        locationReady = true;
                        renderSkyData();
                    }, { timeout: 8000, enableHighAccuracy: true }
                );
            } else {
                locationReady = true;
                renderSkyData();
            }
        }

        // ================================================================
        // 9. BAŞLAT
        // ================================================================
        let initDone = false;

        function init() {
            if (initDone) return;
            initDone = true;
            console.log('🚀 Lilithian başlatılıyor...');

            renderStaticContent();
            getLocation();

            if (typeof Astronomy !== 'undefined') {
                console.log('✅ Astronomy zaten yüklü.');
                renderSkyData();
            } else {
                console.log('⏳ Astronomy yüklenmesi bekleniyor...');
                const checkInterval = setInterval(() => {
                    if (typeof Astronomy !== 'undefined') {
                        clearInterval(checkInterval);
                        console.log('✅ Astronomy yüklendi.');
                        renderSkyData();
                    }
                }, 500);

                setTimeout(() => {
                    clearInterval(checkInterval);
                    if (typeof Astronomy === 'undefined') {
                        console.error('❌ Astronomy yüklenemedi.');
                        document.getElementById('skyTableContainer').innerHTML =
                            '<div class="error-msg">⚠️ Astronomi kütüphanesi yüklenemedi. Lütfen sayfayı yenileyin.</div>';
                    }
                }, 10000);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        window.onerror = function(msg, url, line, col, error) {
            console.error('❌ Global hata:', msg, error);
            return true;
        };
    </script>
</body>
